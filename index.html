<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACKROOMS RECRUITMENT SYSTEM</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:Courier New, monospace;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* scanlines */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,102,0.03),
        rgba(0,255,102,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

/* glitch */
.glitch{
    text-shadow:2px 0 red, -2px 0 blue;
    animation:flicker 2s infinite;
}
@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:0.7;}
}

/* layout */
.screen{
    width:90%;
    max-width:900px;
}

.line{
    white-space:pre;
    font-size:15px;
    line-height:1.6;
}

/* button */
button{
    margin-top:20px;
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 15px;
    font-family:Courier New;
    cursor:pointer;
}
button:hover{
    background:#00ff66;
    color:black;
}

/* inputs */
input{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:6px;
    margin-top:5px;
}

/* hidden screens */
#form, #documentScreen, #loadingScreen{
    display:none;
}

/* LOADING BAR */
.bar{
    width:100%;
    height:20px;
    border:1px solid #00ff66;
    margin-top:20px;
}
.barFill{
    height:100%;
    width:0%;
    background:#00ff66;
}

/* STAMP */
.stamp{
    position:absolute;
    top:120px;
    right:60px;
    border:4px solid red;
    color:red;
    font-weight:bold;
    padding:10px;
    transform:rotate(-10deg);
    opacity:0;
}
</style>
</head>

<body>

<div class="screen">

<!-- TERMINAL -->
<div id="terminal">
<div class="line glitch">BACKROOMS SYSTEM v1.0</div>
<br>
<div class="line">Łączenie z Level 0...</div>
<div class="line">[OK] Stabilne połączenie</div>
<div class="line">[OK] Dostęp przyznany</div>
<div class="line">STATUS: OCZEKIWANIE NA REKRUTA</div>
<br>
<button id="startBtn">WEJDŹ DO SYSTEMU</button>
</div>

<!-- FORM -->
<div id="form">
<div class="line glitch">REJESTRACJA REKRUTA</div>
<br>

<label>IMIĘ I NAZWISKO:</label><br>
<input id="name" type="text"><br><br>

<button id="submitBtn">ZATWIERDŹ</button>

<br><br>
<div id="result"></div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
<div class="line glitch">PRZETWARZANIE DANYCH...</div>
<br>

<div class="line" id="loadingText">Inicjalizacja akta...</div>

<div class="bar"><div class="barFill" id="barFill"></div></div>
</div>

<!-- DOCUMENT -->
<div id="documentScreen">

<div class="stamp" id="stamp">ZAAKCEPTOWANO</div>

<div class="line glitch">INSTYTUT BACKROOMS</div>
<br>

<div class="info-box" id="infoBox">
<p><strong>NUMER AKT:</strong> BR-2026-074</p>
<p><strong>POZIOM DOSTĘPU:</strong> 0</p>
</div>

<div class="line" id="finalText"></div>

</div>

</div>

<script>

let recruitName = "";
let recruitID = 0;

/* START */
document.getElementById("startBtn").onclick = () => {
    document.getElementById("terminal").style.display = "none";
    document.getElementById("form").style.display = "block";
};

/* ID */
function generateID(){
    return Math.floor(100000 + Math.random()*900000);
}

/* SUBMIT */
document.getElementById("submitBtn").onclick = () => {

    recruitName = document.getElementById("name").value;

    if(!recruitName){
        alert("BRAK DANYCH");
        return;
    }

    recruitID = generateID();

    document.getElementById("result").innerHTML =
        `<div class="line glitch">SUKCES</div>
         <div class="line">REKRUT: ${recruitName}</div>
         <div class="line">ID: ${recruitID}</div>`;

    startLoading();
};

/* LOADING EFFECT */
function startLoading(){

    document.getElementById("form").style.display = "none";
    document.getElementById("loadingScreen").style.display = "block";

    let bar = document.getElementById("barFill");
    let text = document.getElementById("loadingText");

    let progress = 0;

    let messages = [
        "Inicjalizacja akta...",
        "Skanowanie pamięci...",
        "Łączenie z archiwum...",
        "Analiza anomalii...",
        "Tworzenie profilu..."
    ];

    let i = 0;

    let interval = setInterval(() => {

        progress += 5;
        bar.style.width = progress + "%";

        if(progress % 20 === 0 && i < messages.length){
            text.innerText = messages[i];
            i++;
        }

        if(progress >= 100){
            clearInterval(interval);
            showDocument();
        }

    }, 120);
}

/* DOCUMENT */
function showDocument(){

    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("documentScreen").style.display = "block";

    document.getElementById("finalText").innerHTML =
        `ZAREKRUTOWANO: ${recruitName}<br>ID SYSTEMOWE: ${recruitID}`;

    setTimeout(() => {
        document.getElementById("stamp").style.opacity = 1;
    }, 800);

    playSound();
}

/* SOUND */
function playSound(){
    const audio = new Audio("https://actions.google.com/sounds/v1/office/printer.ogg");
    audio.play();
}

</script>

</body>
</html>
