<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACKROOMS SYSTEM</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:Courier New, monospace;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ekran */
.screen{
    width:90%;
    max-width:900px;
}

/* tekst terminala */
.line{
    white-space:pre;
    font-size:15px;
    line-height:1.6;
}

/* glitch */
.glitch{
    text-shadow:1px 0 red, -1px 0 blue;
}

/* kursor */
.cursor{
    display:inline-block;
    width:10px;
    background:#00ff66;
    animation:blink 0.8s infinite;
}

@keyframes blink{
    0%,50%{opacity:1;}
    51%,100%{opacity:0;}
}

/* przycisk */
button{
    margin-top:20px;
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 15px;
    font-family:Courier New, monospace;
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

/* formularz */
#form{
    display:none;
}
input{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="screen">

<!-- 🔥 START TERMINAL -->
<div id="terminal">

<div class="line glitch">BACKROOMS EXPLORATION SYSTEM</div>
<br>

<div class="line">Łączenie z Level 0...</div>
<div class="line">[OK] Połączenie stabilne</div>
<div class="line">[OK] Dostęp przyznany</div>
<div class="line">[!] Wykryto anomalie przestrzenne</div>

<br>

<div class="line">STATUS: OCZEKIWANIE NA REKRUTA</div>
<br>

<div class="line">Naciśnij ENTER lub kliknij aby kontynuować</div>

<button id="startBtn">[ WEJDŹ DO SYSTEMU ]</button>

</div>

<!-- 🧠 FORMULARZ -->
<div id="form">

<div class="line glitch">REJESTRACJA REKRUTA</div>
<br>

<label>ID REKRUTA:</label><br>
<input type="text"><br><br>

<label>POZIOM DOSTĘPU:</label><br>
<input type="text"><br><br>

<label>STATUS PSYCHICZNY:</label><br>
<input type="text"><br><br>

<button id="submitBtn">ZATWIERDŹ</button>

<br><br>

<div class="line">SYSTEM: OCZEKUJE NA WERYFIKACJĘ...</div>

</div>

</div>

<script>

function startGame(){
    document.getElementById("terminal").style.display = "none";
    document.getElementById("form").style.display = "block";
}

/* klik */
document.getElementById("startBtn").addEventListener("click", startGame);

/* ENTER */
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        startGame();
    }
});

</script>

</body>
</html>
