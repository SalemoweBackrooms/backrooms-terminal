<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>INSTITUTE // BACKROOMS ACCESS NODE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUDIO -->
<audio id="hum" src="audio/hum.mp3" loop></audio>
<audio id="activity" src="audio/activity.mp3"></audio>
<audio id="glitch" src="audio/glitch.mp3"></audio>

<!-- BOOT -->
<div id="boot">
  <div id="bootText"></div>
</div>

<!-- TERMINAL -->
<div id="terminal" class="hidden">
  <div id="nadzorca"></div>
  <button onclick="startForm()">ROZPOCZNIJ REJESTRACJĘ</button>
</div>

<!-- FORMULARZ -->
<div id="form" class="hidden">
  <h2>KWESTIONARIUSZ REKRUTACYJNY</h2>

  <input id="name" placeholder="Imię">
  <input id="age" placeholder="Wiek">

  <p>Czy słyszysz dźwięki w pustych przestrzeniach?</p>
  <select id="q1">
    <option>TAK</option>
    <option>NIE</option>
  </select>

  <p>Czy akceptujesz obserwację?</p>
  <select id="q2">
    <option>TAK</option>
    <option>NIE</option>
  </select>

  <p>Czy miałeś kontakt z nieciągłością?</p>
  <select id="q3">
    <option>TAK</option>
    <option>NIE</option>
  </select>

  <p>Czy pamiętasz wszystkie sny?</p>
  <select id="q4">
    <option>TAK</option>
    <option>NIE</option>
  </select>

  <button onclick="submitForm()">PRZEŚLIJ DANE</button>
</div>

<!-- AKTA -->
<div id="files" class="hidden">
  <h2>AKTA REKRUTA</h2>
  <div id="file"></div>

  <button onclick="downloadFile()">POBIERZ DOKUMENT</button>
</div>

<script src="script.js"></script>
</body>
</html>
