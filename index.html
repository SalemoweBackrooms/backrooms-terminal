<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACKROOMS SYSTEM</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:Courier New, monospace;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* scanlines */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,102,0.03),
        rgba(0,255,102,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

.screen{width:90%;max-width:900px;}
.line{white-space:pre;font-size:15px;line-height:1.6;}

.glitch{text-shadow:2px 0 red,-2px 0 blue;}

button{
    margin-top:20px;
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 15px;
    cursor:pointer;
}

button:hover{background:#00ff66;color:black;}

input{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:6px;
}

/* ekrany */
#form,#loading,#doc{display:none;}

/* loading bar */
.bar{width:100%;height:20px;border:1px solid #00ff66;margin-top:20px;}
.fill{height:100%;width:0%;background:#00ff66;}

.stamp{
    position:absolute;
    top:120px;
    right:60px;
    border:4px solid red;
    color:red;
    padding:10px;
    transform:rotate(-10deg);
    opacity:0;
}
</style>
</head>

<body>

<div class="screen">

<!-- TERMINAL -->
<div id="terminal">
<div class="line glitch">BACKROOMS SYSTEM</div>
<br>
<div class="line">Łączenie z Level 0...</div>
<div class="line">[OK] stabilne</div>
<div class="line">STATUS: OCZEKIWANIE</div>

<button id="start">WEJDŹ</button>
</div>

<!-- FORM -->
<div id="form">
<div class="line glitch">REJESTRACJA</div>
<br>

<input id="name" placeholder="Imię i nazwisko">
<br><br>

<button id="send">ZATWIERDŹ</button>

<div id="result"></div>
</div>

<!-- LOADING -->
<div id="loading">
<div class="line glitch">PRZETWARZANIE...</div>
<br>

<div class="line" id="loadingText">start...</div>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<!-- DOC -->
<div id="doc">

<div class="stamp" id="stamp">ZAAKCEPTOWANO</div>

<div class="line glitch">AKTA REKRUTA</div>
<br>

<div id="final"></div>

</div>

</div>

<script>

let name = "";
let id = 0;
let userInteracted = false;

/* START */
document.getElementById("start").onclick = () => {
    userInteracted = true;
    document.getElementById("terminal").style.display="none";
    document.getElementById("form").style.display="block";
};

/* ID */
function gen(){
    return Math.floor(100000 + Math.random()*900000);
}

/* SUBMIT */
document.getElementById("send").onclick = () => {

    name = document.getElementById("name").value;

    if(!name) return alert("Brak danych");

    id = gen();

    document.getElementById("result").innerHTML =
        `<div class="line glitch">SUKCES</div>
         <div class="line">${name}</div>
         <div class="line">ID: ${id}</div>`;

    startLoading();
};

/* LOADING */
function startLoading(){

    document.getElementById("form").style.display="none";
    document.getElementById("loading").style.display="block";

    let bar = document.getElementById("fill");
    let txt = document.getElementById("loadingText");

    let p = 0;

    let msgs = ["analiza...", "skan...", "archiwum...", "tworzenie profilu..."];
    let i = 0;

    let int = setInterval(()=>{

        p += 5;
        bar.style.width = p + "%";

        if(p % 25 === 0){
            txt.innerText = msgs[i++] || "finalizacja...";
        }

        if(p >= 100){
            clearInterval(int);
            showDoc();
        }

    },80);
}

/* DOC */
function showDoc(){

    document.getElementById("loading").style.display="none";
    document.getElementById("doc").style.display="block";

    document.getElementById("final").innerHTML =
        `REKRUT: ${name}<br>ID SYSTEMOWE: ${id}`;

    setTimeout(()=>{
        document.getElementById("stamp").style.opacity=1;
    },600);

    /* DŹWIĘK (DZIAŁA TYLKO PO INTERAKCJI) */
    if(userInteracted){
        let audio = new Audio("https://actions.google.com/sounds/v1/office/printer.ogg");
        audio.play().catch(()=>{});
    }
}

</script>

</body>
</html>
