<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACKROOMS SYSTEM v7</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:Courier New;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.screen{display:none;width:90%;max-width:1000px;}
.active{display:block;}

.line{white-space:pre;font-size:15px;line-height:1.6;}
.glitch{text-shadow:2px 0 red,-2px 0 blue;}

button{
    margin-top:20px;
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px;
    cursor:pointer;
}
button:hover{background:#00ff66;color:black;}

input{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:6px;
}

.bar{width:100%;height:20px;border:1px solid #00ff66;margin-top:15px;}
.fill{height:100%;width:0%;background:#00ff66;}

#glitchOverlay{
    position:fixed;
    inset:0;
    background:black;
    color:#00ff66;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    opacity:0;
    pointer-events:none;
    z-index:9999;
}

.stamp{
    position:absolute;
    top:120px;
    right:80px;
    border:4px solid red;
    color:red;
    padding:10px;
    transform:rotate(-10deg);
    opacity:0;
}
</style>
</head>

<body>

<div id="glitchOverlay">SYSTEM ERROR</div>

<!-- TERMINAL -->
<div id="terminal" class="screen active">
<div class="line glitch">BACKROOMS SYSTEM v7</div>
<br>
<div class="line">Łączenie z systemem...</div>
<button onclick="start()">WEJDŹ</button>
</div>

<!-- RECRUIT -->
<div id="recruit" class="screen">
<div class="line glitch">REJESTRACJA</div>
<input id="name">
<br><br>
<button onclick="submitRecruit()">OK</button>
<div id="result"></div>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
<div class="line glitch">PRZETWARZANIE...</div>
<div class="bar"><div class="fill" id="bar"></div></div>
</div>

<!-- STAMP -->
<div id="stampScreen" class="screen">
<div class="stamp" id="stamp">ZAAKCEPTOWANO</div>
<div id="info"></div>
</div>

<!-- FORM -->
<div id="form" class="screen">
<div class="line glitch">KWESTIONARIUSZ</div>

<input id="q_name" placeholder="Imię"><br><br>
<input id="q_house" placeholder="Dom"><br><br>
<input id="q_year" placeholder="Rok"><br><br>

<label><input type="checkbox" id="c1"> procedury</label><br>
<label><input type="checkbox" id="c2"> anomalie</label><br>
<label><input type="checkbox" id="c3"> ryzyko</label><br>

<button onclick="submitForm()">ZATWIERDŹ</button>

<br><br>
<div id="out"></div>
</div>

<script>

let name="";
let id=0;
let recruits=JSON.parse(localStorage.getItem("recruits")||"[]");
let outcome="neutral";

/* NPC SYSTEM */
let npcLines=[
"// NADZORCA: obserwacja rozpoczęta",
"// NADZORCA: analiza rekruta...",
"// NADZORCA: dane niestabilne",
"// NADZORCA: wszystko jest monitorowane",
"// NADZORCA: nie ufaj odpowiedziom"
];

/* SCREEN */
function show(s){
document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
document.getElementById(s).classList.add("active");
}

/* GLITCH */
function glitch(cb){
let o=document.getElementById("glitchOverlay");
let t=["ERROR","CORRUPT","REALIGN","///","SYSTEM"];
let i=0;
o.style.opacity=1;
let int=setInterval(()=>o.innerText=t[i++]||"///",120);
setTimeout(()=>{clearInterval(int);o.style.opacity=0;cb();},800);
}

function start(){glitch(()=>show("recruit"));}

function genID(){
return Math.floor(100000+Math.random()*900000);
}

/* RECRUIT */
function submitRecruit(){
name=document.getElementById("name").value;
if(!name) return alert("Brak danych");
id=genID();
startLoading();
}

function startLoading(){
show("loading");
let b=document.getElementById("bar");
let p=0;
let int=setInterval(()=>{
p+=6;
b.style.width=p+"%";
if(p>=100){
clearInterval(int);
showStamp();
}
},60);
}

function showStamp(){
glitch(()=>{
show("stampScreen");
document.getElementById("stamp").style.opacity=1;
document.getElementById("info").innerHTML=
`REKRUT: ${name}<br>ID: ${id}`;
setTimeout(()=>glitch(()=>show("form")),2000);
});
}

/* NPC MESSAGE */
function npcMessage(type){

if(type==="accepted") return "NADZORCA: rekrut zaakceptowany.";
if(type==="rejected") return "NADZORCA: brak kompatybilności.";
if(type==="anomaly") return "NADZORCA: wykryto anomalię danych.";
if(type==="secret") return "NADZORCA: ...to nie powinno istnieć.";

return "NADZORCA: obserwacja aktywna.";
}

/* FORM */
function submitForm(){

let qn=document.getElementById("q_name").value;
let h=document.getElementById("q_house").value;
let y=document.getElementById("q_year").value;

let c1=document.getElementById("c1").checked;
let c2=document.getElementById("c2").checked;
let c3=document.getElementById("c3").checked;

/* DEFAULT */
outcome="accepted";

/* REJECT */
if(!qn||!h||!y){
outcome="rejected";
}

/* RANDOM ANOMALY */
if(Math.random()<0.2){
outcome="anomaly";
}

/* SECRET PATH */
if(c1&&c2&&c3){
outcome="secret";
}

/* EASTER */
if(qn.toLowerCase().includes("null")){
outcome="secret";
}

/* SAVE */
recruits.push({qn,h,y,c1,c2,c3,id,outcome});
localStorage.setItem("recruits",JSON.stringify(recruits));

/* NPC OUTPUT */
document.getElementById("out").innerHTML=
`<div class="line glitch">${npcMessage(outcome)}</div>`;

/* RANDOM NPC OBSERVATION */
setTimeout(()=>{
document.getElementById("out").innerHTML+=
`<div class="line">${npcLines[Math.floor(Math.random()*npcLines.length)]}</div>`;
},800);

/* DOCUMENT */
let bg="#000",col="#00ff66";

if(outcome==="rejected"){bg="#200";col="#ff4444";}
if(outcome==="anomaly"){bg="#111";col="#ffaa00";}
if(outcome==="secret"){bg="#000033";col="#66f";}

let doc=`
<html>
<head>
<style>
body{
background:${bg};
color:${col};
font-family:Courier New;
padding:40px;
}
.box{border:1px solid ${col};padding:20px;}
h1{text-shadow:2px 0 red,-2px 0 blue;}
.npc{color:#888;font-style:italic;}
</style>
</head>
<body>

<h1>AKTA REKRUTA</h1>

<div class="box">
REKRUT: ${qn}<br>
DOM: ${h}<br>
ROK: ${y}<br><br>

ID: ${id}<br>
OUTCOME: ${outcome}<br><br>

PROCEDURY: ${c1}<br>
ANOMALIE: ${c2}<br>
RYZYKO: ${c3}<br>
</div>

<div class="npc">
${npcMessage(outcome)}
</div>

</body>
</html>
`;

let blob=new Blob([doc],{type:"text/html"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="AKTA_"+qn+".html";
a.click();

URL.revokeObjectURL(url);
}

</script>

</body>
</html>
