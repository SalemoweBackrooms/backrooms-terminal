<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BACKROOMS INSTITUTE // NODE 0</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="hum" src="audio/hum.mp3" loop></audio>
<audio id="activity" src="audio/activity.mp3"></audio>
<audio id="glitch" src="audio/glitch.mp3"></audio>

<div id="nadzorca"></div>
<div id="glitchOverlay"></div>

<!-- BOOT -->
<section id="boot" class="screen active">
  <h1>INITIALIZING NODE 0...</h1>
  <button onclick="next('intro')">CONTINUE</button>
</section>

<!-- INTRO -->
<section id="intro" class="screen">
  <h2>NADZORCA AI</h2>
  <p id="introText"></p>
  <button onclick="next('form')">START</button>
</section>

<!-- FORM -->
<section id="form" class="screen">
  <h2>REJESTRACJA</h2>

  <input id="name" placeholder="Imię">
  <input id="surname" placeholder="Nazwisko">
  <input id="age" placeholder="Wiek">
  <input id="role" placeholder="Dom / Funkcja">

  <label><input type="checkbox"> Zgoda na obserwację</label><br>
  <label><input type="checkbox"> Zgoda na analizę</label><br>
  <label><input type="checkbox"> Akceptacja niestabilności</label><br>

  <button onclick="next('quiz')">DALEJ</button>
</section>

<!-- QUIZ -->
<section id="quiz" class="screen">
  <h2>KWESTIONARIUSZ</h2>

  <p>Czy słyszysz szum?</p>
  <select id="q1"><option>TAK</option><option>NIE</option></select>

  <p>Czy przestrzeń się zmienia?</p>
  <select id="q2"><option>TAK</option><option>NIE</option></select>

  <p>Czy jesteś obserwowany?</p>
  <select id="q3"><option>TAK</option><option>NIE</option></select>

  <button onclick="analyze()">ANALIZA</button>
</section>

<!-- ANALYSIS -->
<section id="analysis" class="screen">
  <h2>ANALIZA SYSTEMOWA</h2>
  <p id="analysisText"></p>
</section>

<!-- LOADING -->
<section id="loading" class="screen">
  <h2>PROCESSING NODE 0...</h2>
  <p id="loadingText"></p>
</section>

<!-- INTERVENTION -->
<section id="intervention" class="screen">
  <h2>NADZORCA</h2>
  <p id="nadzorcaMsg"></p>
  <button onclick="next('docs')">CONTINUE</button>
</section>

<!-- AKTA -->
<section id="docs" class="screen">
  <h2>AKTA REKRUTA</h2>

  <div id="paper"></div>

  <button onclick="downloadFile()">DOWNLOAD AKTA</button>
</section>

<script src="script.js"></script>
</body>
</html>
